---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: loki-secret
  namespace: monitoring
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: loki-secret
    creationPolicy: Owner
  data:
    - secretKey: bucket
      remoteRef:
        key: loki
        property: bucket
    - secretKey: region
      remoteRef:
        key: loki
        property: region
    - secretKey: access_key
      remoteRef:
        key: loki
        property: access_key
    - secretKey: secret_key
      remoteRef:
        key: loki
        property: secret_key
